<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>변수 - 2</title>
    <style>
      span {
        color: red;
      }
    </style>
  </head>
  <body>
    <script>
      //변수연산
      let x = 400;
      let y = 50;
      let total = x + y;
      let multiplication = x * y;
      let division = x / y;
      console.log(x, y);
      console.log(total);
      console.log(multiplication);
      console.log(division);
      document.writeln(
        `<p> x와 y를 더한 금액은 <span> ${total} </span>입니다.</p>`,
      );
      document.writeln(
        `<p> x와 y를 곱한 금액은 <span> ${multiplication} </span>입니다.</p>`,
      );
      document.writeln(
        `<p> x와 y를 나눈 금액은 <span> ${division} </span>입니다.</p>`,
      );
    </script>
  </body>
</html>
