<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>변수 - 4</title>
    <style>
      span {
        color: red;
      }
    </style>
  </head>
  <body>
    <script>
      let now = new Date();
      console.log(now);
      let display = now.toDateString();
      let displayTime = now.toLocaleTimeString();
      console.log(display);
      document.write(
        `오늘 날짜는 <span>${display}</span>이고 , 현재 시각은 <span>${displayTime}</span>입니다.`,
      );
    </script>
  </body>
</html>
