<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>변수 - 2</title>
    <style>
      span {
        color: red;
      }
    </style>
  </head>
  <body>
    <script>
      let banana = 3000;
      let apple = 1500;
      let mango = 1500;
      let bananaCount = 5;
      let appleCount = 4;
      let mangoCount = 2;
      let total = (banana *bananaCount) + (apple * appleCount) + (mango * mangoCount);
      console.log(total);
      document.write(
        `<p> 바나나와 사과와 망고를 더한 금액은 <span> ${total} </span>입니다.</p>`,
      );
    </script>
  </body>
